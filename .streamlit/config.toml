# ============================================
# Streamlit Configuration File
# Body Performance Analytics - Professional Dark Theme
# ============================================

[theme]
# اللون الأساسي للأزرار والروابط والعناصر التفاعلية
primaryColor = "#00A3C4"

# خلفية الصفحة الرئيسية (الوضع الداكن الاحترافي)
backgroundColor = "#0E1117"

# خلفية العناصر الثانوية مثل الكروت والسايد بار
secondaryBackgroundColor = "#161B22"

# لون النصوص الرئيسية
textColor = "#EAEAEA"

# نوع الخط المستخدم في التطبيق
font = "sans serif"

# ============================================
# إعدادات إضافية (اختيارية)
# ============================================

[server]
# منع إعادة التشغيل التلقائي عند تغيير الملفات (للسيرفر)
runOnSave = false

[browser]
# عنوان التطبيق في المتصفح
gatherUsageStats = false

[client]
# عرض شريط الأدوات
toolbarMode = "auto"
